name: CI

on:
  push:
    branches:
      - "**"

permissions: read-all

defaults:
  run:
    shell: bash

env:
  PYTHONUNBUFFERED: "1"
  NODE_VERSION: "20"

jobs:
  backend:
    name: Backend tests and Ruff
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend dependencies
        run: |
          python -m venv backend/.venv
          backend/.venv/bin/python -m pip install --upgrade pip
          backend/.venv/bin/pip install -e "backend/.[dev]"

      - name: Ruff check
        working-directory: backend
        run: .venv/bin/ruff check .

      - name: Ruff format check
        working-directory: backend
        run: .venv/bin/ruff format --check .

      - name: Run backend tests via Makefile
        run: make test

      - name: Run backend tests via pytest
        working-directory: backend
        run: .venv/bin/pytest

  frontend:
    name: Frontend build verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  desktop:
    name: Desktop TypeScript check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Run desktop lint
        working-directory: desktop
        run: npm run lint

  extension:
    name: Extension compilation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Install extension dependencies
        working-directory: extension
        run: npm ci

      - name: Compile extension
        working-directory: extension
        run: npm run compile
